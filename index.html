<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skyドレスアップアイテム所持チェック</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Design tokens ─────────────────────────── */
    :root {
      --bg:        #F2F2F7;
      --card:      #FFFFFF;
      --sep:       rgba(60,60,67,0.12);
      --orange:    #FF9500;
      --orange-d:  #FF6200;
      --orange-bg: rgba(255,149,0,0.10);
      --blue:      #007AFF;
      --blue-bg:   rgba(0,122,255,0.08);
      --green:     #34C759;
      --green-bg:  rgba(52,199,89,0.10);
      --text:      #1C1C1E;
      --text-2:    #8E8E93;
      --text-3:    #C7C7CC;
      --r:         16px;
      --r-sm:      10px;
    }

    /* ── Reset ─────────────────────────────────── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    a { text-decoration:none; color:inherit; -webkit-tap-highlight-color:transparent; }
    button { cursor:pointer; border:none; background:none; font-family:inherit; }

    /* ── Body ──────────────────────────────────── */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans',
                   'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* ── Navigation bar ────────────────────────── */
    nav {
      position: sticky; top: 0; z-index: 20;
      background: rgba(242,242,247,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 0.5px solid var(--sep);
      padding: 14px 20px 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-title {
      font-size: 17px; font-weight: 600; letter-spacing: -0.3px;
    }
    .nav-action {
      color: var(--blue); font-size: 15px; padding: 4px 0;
    }

    /* ── Content wrapper ───────────────────────── */
    .wrap {
      max-width: 720px; margin: 0 auto; padding: 0 16px;
    }

    /* ── Section labels ────────────────────────── */
    .sec-label {
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.6px;
      color: var(--text-2);
      padding: 22px 4px 8px;
    }

    /* ── Banner card (overall rate) ────────────── */
    .banner {
      background: linear-gradient(135deg, var(--orange-d) 0%, var(--orange) 55%, #FFBB00 100%);
      border-radius: var(--r);
      padding: 22px 20px;
      color: #fff;
      position: relative; overflow: hidden;
      box-shadow: 0 4px 18px rgba(255,120,0,0.28);
    }

    /* Decorative circles */
    .banner::before {
      content:''; position:absolute;
      top:-40px; right:-30px;
      width:180px; height:180px;
      background: rgba(255,255,255,0.09);
      border-radius: 50%; pointer-events:none;
    }
    .banner::after {
      content:''; position:absolute;
      bottom:-60px; right:60px;
      width:220px; height:220px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%; pointer-events:none;
    }

    .banner-inner {
      position: relative; z-index:1;
      display: flex; align-items: center; gap: 18px;
    }

    /* Circular gauge */
    .gauge-wrap {
      flex-shrink: 0; position: relative;
      width: 96px; height: 96px;
    }
    .gauge-svg {
      width: 96px; height: 96px;
      transform: rotate(-90deg);
    }
    .g-track {
      fill: none;
      stroke: rgba(255,255,255,0.28);
      stroke-width: 8;
    }
    .g-fill {
      fill: none;
      stroke: #fff;
      stroke-width: 8;
      stroke-linecap: round;
      /* r=38: C ≈ 238.8 */
      stroke-dasharray: 238.8;
      stroke-dashoffset: 238.8;
      transition: stroke-dashoffset 1.4s cubic-bezier(0.22,1,0.36,1);
    }
    .gauge-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .gauge-pct {
      font-size: 21px; font-weight: 700;
      letter-spacing: -0.5px; line-height:1; color:#fff;
    }
    .gauge-lbl {
      font-size: 8px; opacity: 0.78;
      margin-top: 3px; letter-spacing: 0.8px;
    }

    /* Banner text side */
    .banner-text { flex:1; }
    .banner-title {
      font-size: 13px; opacity: 0.85;
      margin-bottom: 12px; letter-spacing: 0.2px;
    }
    .banner-nums {
      display: flex; gap: 24px;
    }
    .bnum-val {
      font-size: 26px; font-weight: 700;
      letter-spacing: -0.8px; line-height:1; color:#fff;
    }
    .bnum-lbl {
      font-size: 11px; opacity: 0.8; margin-top: 4px;
    }

    /* ── Category grid ─────────────────────────── */
    .cat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* ── Category card ─────────────────────────── */
    .cat-card {
      display: block;
      background: var(--card);
      border-radius: var(--r);
      padding: 14px 14px 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07), 0 0.5px 1px rgba(0,0,0,0.04);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .cat-card:active {
      transform: scale(0.965);
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .cat-top {
      display: flex; align-items: flex-start;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 10px;
    }

    .cat-icon-wrap {
      display: flex; align-items: center; gap: 8px; flex:1; min-width:0;
    }

    .cat-icon {
      width: 34px; height: 34px;
      border-radius: 8px;
      background: var(--bg);
      display: flex; align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .cat-name {
      font-size: 12px; font-weight: 600;
      line-height: 1.35; color: var(--text);
      word-break: break-all;
    }

    .cat-pct {
      font-size: 14px; font-weight: 700;
      color: var(--orange); flex-shrink: 0;
      white-space: nowrap;
    }
    .cat-pct.high  { color: var(--green); }
    .cat-pct.empty { color: var(--text-3); }

    /* Progress bar */
    .cat-bar {
      height: 5px; border-radius: 3px;
      background: var(--bg); overflow: hidden;
      margin-bottom: 7px;
    }
    .cat-fill {
      height: 100%; border-radius: 3px; width: 0%;
      transition: width 1.2s cubic-bezier(0.22,1,0.36,1);
      background: linear-gradient(90deg, var(--orange), #FFBB00);
    }
    .cat-fill.high {
      background: linear-gradient(90deg, var(--green), #90EFA8);
    }

    .cat-bottom {
      display: flex; align-items: center;
      justify-content: space-between;
    }
    .cat-count { font-size: 11px; color: var(--text-2); }
    .cat-chevron { color: var(--text-3); font-size: 15px; font-weight: 300; }

    /* ── Hint box ──────────────────────────────── */
    .hint {
      margin-top: 10px;
      background: var(--blue-bg);
      border-radius: var(--r-sm);
      padding: 12px 14px;
      font-size: 12px;
      color: var(--blue);
      line-height: 1.65;
      display: flex; gap: 6px;
    }

    /* ── Sidebar & App layout ──────────────── */
    .app-layout {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 16px;
    }

    .app-layout > .wrap {
      max-width: none; margin: 0; padding: 0; flex: 1; min-width: 0;
    }

    @media (min-width: 850px) {
      .app-layout {
        max-width: 960px;
        display: flex; gap: 20px; align-items: flex-start;
      }
    }

    .sidebar {
      width: 200px; flex-shrink: 0;
      position: sticky; top: 58px;
      background: var(--card);
      border-radius: var(--r);
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07), 0 0.5px 1px rgba(0,0,0,0.04);
      display: none;
    }

    @media (min-width: 850px) { .sidebar { display: block; } }

    .sidebar.sidebar-open {
      display: flex !important; flex-direction: column;
      position: fixed; top: 0; left: 0;
      height: 100%; width: 240px;
      z-index: 500; overflow-y: auto;
      border-radius: 0 var(--r) var(--r) 0;
      box-shadow: 4px 0 24px rgba(0,0,0,0.18);
    }

    .sidebar-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35); z-index: 499;
    }

    .sidebar-overlay.visible {
      display: block;
      animation: sbFadeIn 0.2s ease;
    }

    @keyframes sbFadeIn { from { opacity:0; } to { opacity:1; } }

    .sb-label {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--text-2); margin-bottom: 8px; padding: 0 4px;
    }

    .sb-link {
      display: flex; align-items: center; gap: 9px;
      padding: 9px 12px; border-radius: var(--r-sm);
      color: var(--text); font-size: 13.5px; font-weight: 500;
      transition: background 0.15s; margin-bottom: 2px;
      background: transparent; text-decoration: none;
      width: 100%; box-sizing: border-box;
    }

    .sb-link:hover { background: var(--bg); }

    .sb-link.current {
      background: var(--orange-bg); color: var(--orange); font-weight: 700;
    }

    .sb-close-btn {
      background: none; border: none; font-size: 22px;
      cursor: pointer; color: var(--text-2);
      padding: 0; line-height: 1; flex-shrink: 0;
    }

    .sb-toggle-btn {
      color: var(--blue); font-size: 15px; padding: 4px 0;
      display: flex; align-items: center; gap: 4px; font-weight: 500;
      white-space: nowrap;
    }

    @media (min-width: 850px) {
      .sb-toggle-btn { display: none; }
      .sb-close-btn  { display: none; }
    }

    /* ── Responsive ────────────────────────────── */
    @media (min-width: 600px) {
      .cat-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 380px) {
      .cat-grid { grid-template-columns: 1fr; }
      .banner-nums { gap: 16px; }
      .bnum-val { font-size: 22px; }
    }
  </style>
</head>
<body>

<!-- ▸ Navigation bar -->
<nav>
  <div class="nav-title">🗂️ Skyドレスアップアイテム所持率管理</div>
  <div style="display:flex; gap:10px; align-items:center;">
    <button class="sb-toggle-btn" onclick="toggleSidebar()">☰ ツール</button>
    <button class="nav-action" onclick="loadAndRender()">更新</button>
  </div>
</nav>

<!-- ▸ Sidebar overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- ▸ App layout -->
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">
      <div class="sb-label" style="margin-bottom:0;">🔗 関連ツール</div>
      <button class="sb-close-btn" onclick="closeSidebar()">×</button>
    </div>
    <div>
      <a href="https://taipak5000.github.io/skyzztai.management.tool/" class="sidebar-nav-link current-tool">
                    🕯️ キャンドル計算機
                </a>
                <a href="https://taipak5000.github.io/companion/" class="sidebar-nav-link">
                    ✨ 精霊同行ツール
                </a>
                <a href="https://taipak5000.github.io/share/" class="sidebar-nav-link">
                    📍 創作物管理ツール
                </a>
                <a href="https://taipak5000.github.io/item/" class="sidebar-nav-link">
                    🗂️ アイテム所持管理
                </a>
    </div>
  </aside>

  <div class="wrap">

  <!-- ▸ Overall rate banner -->
  <p class="sec-label">全体の達成率</p>

  <div class="banner">
    <div class="banner-inner">

      <div class="gauge-wrap">
        <svg class="gauge-svg" viewBox="0 0 96 96">
          <circle class="g-track" cx="48" cy="48" r="38"/>
          <circle class="g-fill"  cx="48" cy="48" r="38" id="gFill"/>
        </svg>
        <div class="gauge-center">
          <div class="gauge-pct" id="oPct">--%</div>
          <div class="gauge-lbl">TOTAL</div>
        </div>
      </div>

      <div class="banner-text">
        <div class="banner-title">コレクション達成率</div>
        <div class="banner-nums">
          <div>
            <div class="bnum-val" id="sOwned">--</div>
            <div class="bnum-lbl">所持中</div>
          </div>
          <div>
            <div class="bnum-val" style="opacity:.72" id="sTotal">--</div>
            <div class="bnum-lbl">総アイテム数</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ▸ Category cards -->
  <p class="sec-label" id="catLabel">カテゴリ一覧</p>

  <div class="cat-grid" id="catGrid"><!-- JS --></div>

  <div class="hint">
    <span>💡</span>
    <span>各カテゴリページでアイテムを登録すると、ここに所持率が自動で反映されます</span>
  </div>

</div><!-- /wrap -->

</div><!-- /.app-layout -->

<script>
/* ── Category list ──────────────────────── */
const CATS = [
  { key:'outfit',          name:'アウトフィット',         file:'outfit.html',          icon:'🧥' },
  { key:'shoes',           name:'シューズ',               file:'shoes.html',           icon:'👟' },
  { key:'mask',            name:'マスク',                 file:'mask.html',            icon:'🎭' },
  { key:'face_accessory',  name:'フェイスアクセサリー',   file:'face_accessory.html',  icon:'💎' },
  { key:'necklace',        name:'ネックレス',             file:'necklace.html',        icon:'📿' },
  { key:'hairstyle',       name:'ヘアスタイル',           file:'hairstyle.html',       icon:'💇' },
  { key:'hair_accessory',  name:'ヘアアクセサリー',       file:'hair_accessory.html',  icon:'👒' },
  { key:'head_accessory',  name:'ヘッドアクセサリー',     file:'head_accessory.html',  icon:'🎧' },
  { key:'cape',            name:'ケープ',                 file:'cape.html',            icon:'🪽‪' },
  { key:'portable_item',   name:'持ち運べるアイテム',     file:'portable_item.html',   icon:'🎹' },
  { key:'small_placeable', name:'小さい設置アイテム',     file:'small_placeable.html', icon:'🏮' },
  { key:'large_placeable', name:'大きい設置アイテム',     file:'large_placeable.html', icon:'🏛️' },
];

const LS     = 'gameItems_';
const CIRC   = 2 * Math.PI * 38; // ≈ 238.8

/* ── Read localStorage ─────────────────── */
function readCat(key) {
  try {
    const d = JSON.parse(localStorage.getItem(LS + key));
    if (d && typeof d.total === 'number' && d.total > 0) return d;
  } catch(_) {}
  return null;
}

function pct(owned, total) {
  return total > 0 ? Math.round(owned / total * 100) : null;
}

/* ── Card HTML ─────────────────────────── */
function cardHTML(cat, data) {
  const p    = data ? pct(data.owned, data.total) : null;
  const high = p !== null && p >= 80;
  const cls  = p === null ? 'empty' : high ? 'high' : '';
  const pTxt = p !== null ? p + '%' : '--';
  const cTxt = data ? `${data.owned} / ${data.total}` : '未登録';

  return `
    <a class="cat-card" href="${cat.file}">
      <div class="cat-top">
        <div class="cat-icon-wrap">
          <div class="cat-icon">${cat.icon}</div>
          <div class="cat-name">${cat.name}</div>
        </div>
        <span class="cat-pct ${cls}">${pTxt}</span>
      </div>
      <div class="cat-bar">
        <div class="cat-fill ${high ? 'high' : ''}"
             style="width:0%" data-target="${p ?? 0}"></div>
      </div>
      <div class="cat-bottom">
        <span class="cat-count">${cTxt}</span>
        <span class="cat-chevron">›</span>
      </div>
    </a>`;
}

/* ── Main render ───────────────────────── */
function loadAndRender() {
  let own = 0, tot = 0, active = 0;

  const html = CATS.map(c => {
    const d = readCat(c.key);
    if (d) { own += d.owned; tot += d.total; active++; }
    return cardHTML(c, d);
  }).join('');

  document.getElementById('catGrid').innerHTML = html;

  const p = pct(own, tot);

  document.getElementById('oPct').textContent   = p !== null ? p + '%' : '--%';
  document.getElementById('sOwned').textContent = tot > 0 ? own : '--';
  document.getElementById('sTotal').textContent = tot > 0 ? tot : '--';
  document.getElementById('catLabel').textContent =
    'カテゴリ一覧' + (active > 0 ? `（${active}/${CATS.length} 登録済み）` : '');

  /* Gauge animation */
  const fill = document.getElementById('gFill');
  fill.style.strokeDasharray  = CIRC;
  fill.style.strokeDashoffset = CIRC;

  requestAnimationFrame(() => {
    fill.style.strokeDashoffset = p !== null ? CIRC * (1 - p / 100) : CIRC;
    document.querySelectorAll('.cat-fill').forEach(el => {
      el.style.width = el.dataset.target + '%';
    });
  });
}

/* ── Init ──────────────────────────────── */
document.addEventListener('DOMContentLoaded', loadAndRender);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) loadAndRender();
});
/* ── Sidebar ────────────────────────────── */
function toggleSidebar() {
  const s = document.getElementById('sidebar');
  const o = document.getElementById('sidebarOverlay');
  const open = s.classList.contains('sidebar-open');
  s.classList.toggle('sidebar-open', !open);
  o.classList.toggle('visible', !open);
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('sidebar-open');
  document.getElementById('sidebarOverlay').classList.remove('visible');
}
</script>

<footer style="text-align:center; padding:24px 16px; color:var(--text-2); font-size:13px; border-top:1px solid var(--sep); margin-top:40px; line-height:1.6;">
  © 2026 アイテム所持管理<br>
  作成・ご意見: <a href="https://x.com/Skyzztai" target="_blank" rel="noopener noreferrer" style="color:var(--blue); text-decoration:none; font-weight:bold;">@Skyzztai</a>
</footer>

</body>
</html>
