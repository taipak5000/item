<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skyドレスアップアイテム所持チェック</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Design tokens ─────────────────────────── */
    :root {
      --bg:        #F2F2F7;
      --card:      #FFFFFF;
      --sep:       rgba(60,60,67,0.12);
      --orange:    #FF9500;
      --orange-d:  #FF6200;
      --orange-bg: rgba(255,149,0,0.10);
      --blue:      #007AFF;
      --blue-bg:   rgba(0,122,255,0.08);
      --green:     #34C759;
      --green-bg:  rgba(52,199,89,0.10);
      --text:      #1C1C1E;
      --text-2:    #8E8E93;
      --text-3:    #C7C7CC;
      --r:         16px;
      --r-sm:      10px;
    }

    /* ── Reset ─────────────────────────────────── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    a { text-decoration:none; color:inherit; -webkit-tap-highlight-color:transparent; }
    button { cursor:pointer; border:none; background:none; font-family:inherit; }

    /* ── Body ──────────────────────────────────── */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans',
                   'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* ── Navigation bar ────────────────────────── */
    nav {
      position: sticky; top: 0; z-index: 20;
      background: rgba(242,242,247,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 0.5px solid var(--sep);
      padding: 14px 20px 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-title {
      font-size: 17px; font-weight: 600; letter-spacing: -0.3px;
    }
    .nav-action {
      color: var(--blue); font-size: 15px; padding: 4px 0;
    }

    /* ── Content wrapper ───────────────────────── */
    .wrap {
      max-width: 720px; margin: 0 auto; padding: 0 16px;
    }

    /* ── Section labels ────────────────────────── */
    .sec-label {
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.6px;
      color: var(--text-2);
      padding: 22px 4px 8px;
    }

    /* ── Banner card (overall rate) ────────────── */
    .banner {
      background: linear-gradient(135deg, var(--orange-d) 0%, var(--orange) 55%, #FFBB00 100%);
      border-radius: var(--r);
      padding: 22px 20px;
      color: #fff;
      position: relative; overflow: hidden;
      box-shadow: 0 4px 18px rgba(255,120,0,0.28);
    }

    /* Decorative circles */
    .banner::before {
      content:''; position:absolute;
      top:-40px; right:-30px;
      width:180px; height:180px;
      background: rgba(255,255,255,0.09);
      border-radius: 50%; pointer-events:none;
    }
    .banner::after {
      content:''; position:absolute;
      bottom:-60px; right:60px;
      width:220px; height:220px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%; pointer-events:none;
    }

    .banner-inner {
      position: relative; z-index:1;
      display: flex; align-items: center; gap: 18px;
    }

    /* Circular gauge */
    .gauge-wrap {
      flex-shrink: 0; position: relative;
      width: 96px; height: 96px;
    }
    .gauge-svg {
      width: 96px; height: 96px;
      transform: rotate(-90deg);
    }
    .g-track {
      fill: none;
      stroke: rgba(255,255,255,0.28);
      stroke-width: 8;
    }
    .g-fill {
      fill: none;
      stroke: #fff;
      stroke-width: 8;
      stroke-linecap: round;
      /* r=38: C ≈ 238.8 */
      stroke-dasharray: 238.8;
      stroke-dashoffset: 238.8;
      transition: stroke-dashoffset 1.4s cubic-bezier(0.22,1,0.36,1);
    }
    .gauge-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .gauge-pct {
      font-size: 21px; font-weight: 700;
      letter-spacing: -0.5px; line-height:1; color:#fff;
    }
    .gauge-lbl {
      font-size: 8px; opacity: 0.78;
      margin-top: 3px; letter-spacing: 0.8px;
    }

    /* Banner text side */
    .banner-text { flex:1; }
    .banner-title {
      font-size: 13px; opacity: 0.85;
      margin-bottom: 12px; letter-spacing: 0.2px;
    }
    .banner-nums {
      display: flex; gap: 24px;
    }
    .bnum-val {
      font-size: 26px; font-weight: 700;
      letter-spacing: -0.8px; line-height:1; color:#fff;
    }
    .bnum-lbl {
      font-size: 11px; opacity: 0.8; margin-top: 4px;
    }

    /* ── Category grid ─────────────────────────── */
    .cat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* ── Category card ─────────────────────────── */
    .cat-card {
      display: block;
      background: var(--card);
      border-radius: var(--r);
      padding: 14px 14px 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07), 0 0.5px 1px rgba(0,0,0,0.04);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .cat-card:active {
      transform: scale(0.965);
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .cat-top {
      display: flex; align-items: flex-start;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 10px;
    }

    .cat-icon-wrap {
      display: flex; align-items: center; gap: 8px; flex:1; min-width:0;
    }

    .cat-icon {
      width: 34px; height: 34px;
      border-radius: 8px;
      background: var(--bg);
      display: flex; align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .cat-name {
      font-size: 12px; font-weight: 600;
      line-height: 1.35; color: var(--text);
      word-break: break-all;
    }

    .cat-pct {
      font-size: 14px; font-weight: 700;
      color: var(--orange); flex-shrink: 0;
      white-space: nowrap;
    }
    .cat-pct.high  { color: var(--green); }
    .cat-pct.empty { color: var(--text-3); }

    /* Progress bar */
    .cat-bar {
      height: 5px; border-radius: 3px;
      background: var(--bg); overflow: hidden;
      margin-bottom: 7px;
    }
    .cat-fill {
      height: 100%; border-radius: 3px; width: 0%;
      transition: width 1.2s cubic-bezier(0.22,1,0.36,1);
      background: linear-gradient(90deg, var(--orange), #FFBB00);
    }
    .cat-fill.high {
      background: linear-gradient(90deg, var(--green), #90EFA8);
    }

    .cat-bottom {
      display: flex; align-items: center;
      justify-content: space-between;
    }
    .cat-count { font-size: 11px; color: var(--text-2); }
    .cat-chevron { color: var(--text-3); font-size: 15px; font-weight: 300; }

    /* ── Hint box ──────────────────────────────── */
    .hint {
      margin-top: 10px;
      background: var(--blue-bg);
      border-radius: var(--r-sm);
      padding: 12px 14px;
      font-size: 12px;
      color: var(--blue);
      line-height: 1.65;
      display: flex; gap: 6px;
    }

    /* ── Sidebar & App layout ──────────────── */
    .app-layout {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 16px;
    }

    .app-layout > .wrap {
      max-width: none; margin: 0; padding: 0; flex: 1; min-width: 0;
    }

    @media (min-width: 850px) {
      .app-layout {
        max-width: 960px;
        display: flex; gap: 20px; align-items: flex-start;
      }
    }

    .sidebar {
      width: 200px; flex-shrink: 0;
      position: sticky; top: 58px;
      background: var(--card);
      border-radius: var(--r);
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07), 0 0.5px 1px rgba(0,0,0,0.04);
      display: none;
    }

    @media (min-width: 850px) { .sidebar { display: block; } }

    .sidebar.sidebar-open {
      display: flex !important; flex-direction: column;
      position: fixed; top: 0; left: 0;
      height: 100%; width: 240px;
      z-index: 500; overflow-y: auto;
      border-radius: 0 var(--r) var(--r) 0;
      box-shadow: 4px 0 24px rgba(0,0,0,0.18);
    }

    .sidebar-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35); z-index: 499;
    }

    .sidebar-overlay.visible {
      display: block;
      animation: sbFadeIn 0.2s ease;
    }

    @keyframes sbFadeIn { from { opacity:0; } to { opacity:1; } }

    .sb-label {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--text-2); margin-bottom: 8px; padding: 0 4px;
    }

    .sb-nav {
      display: flex; flex-direction: column;
    }

    .sb-link {
      display: flex; align-items: center; gap: 9px;
      padding: 9px 12px; border-radius: var(--r-sm);
      color: var(--text); font-size: 13.5px; font-weight: 500;
      transition: background 0.15s; margin-bottom: 2px;
      background: transparent; text-decoration: none;
      width: 100%; box-sizing: border-box;
      white-space: nowrap;
    }

    .sb-link:hover { background: var(--bg); }

    .sb-link.current {
      background: var(--blue-bg); color: var(--blue); font-weight: 600;
    }

    .sb-close-btn {
      background: none; border: none; font-size: 22px;
      cursor: pointer; color: var(--text-2);
      padding: 0; line-height: 1; flex-shrink: 0;
    }

    .sb-toggle-btn {
      color: var(--blue); font-size: 15px; padding: 4px 0;
      display: flex; align-items: center; gap: 4px; font-weight: 500;
      white-space: nowrap;
    }

    @media (min-width: 850px) {
      .sb-toggle-btn { display: none; }
      .sb-close-btn  { display: none; }
    }

    /* ── Feature buttons ───────────────────────── */
    .feature-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .feature-btn {
      background: var(--card); border-radius: var(--r);
      padding: 16px 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      display: flex; flex-direction: column; align-items: flex-start;
      gap: 5px; text-align: left; width: 100%;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .feature-btn:active { transform: scale(0.965); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .feature-icon  { font-size: 26px; }
    .feature-label { font-size: 14px; font-weight: 700; color: var(--text); }
    .feature-desc  { font-size: 11px; color: var(--text-2); line-height: 1.45; }
    .feature-btn.twitter { background: #000; }
    .feature-btn.twitter .feature-label { color: #fff; }
    .feature-btn.twitter .feature-desc  { color: rgba(255,255,255,0.68); }

    /* ── Modal ──────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 1000;
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; animation: mfade 0.2s ease; }
    @keyframes mfade { from { opacity:0 } to { opacity:1 } }

    .modal-card {
      background: var(--card); border-radius: var(--r) var(--r) 0 0;
      width: 100%; max-width: 600px; max-height: 88vh;
      overflow-y: auto; padding: 20px 20px 36px;
      animation: mslide 0.3s cubic-bezier(0.22,1,0.36,1);
    }
    @keyframes mslide { from { transform:translateY(100%) } to { transform:translateY(0) } }

    .modal-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 16px;
    }
    .modal-title  { font-size: 17px; font-weight: 700; }
    .modal-close  { font-size: 22px; color: var(--text-2); padding: 2px 6px; }
    .modal-back   { color: var(--blue); font-size: 14px; font-weight: 500; }

    /* ── Random result rows ─────────────────────── */
    .rand-row {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 0; border-bottom: 0.5px solid var(--sep);
    }
    .rand-icon {
      width: 36px; height: 36px; background: var(--bg);
      border-radius: 10px; display: flex; align-items: center;
      justify-content: center; font-size: 18px; flex-shrink: 0;
    }
    .rand-info  { flex: 1; min-width: 0; }
    .rand-cat   { font-size: 11px; color: var(--text-2); }
    .rand-name  { font-size: 14px; font-weight: 600; margin-top: 1px; }
    .rand-empty { font-size: 13px; color: var(--text-3); font-style: italic; margin-top: 1px; }

    /* 排他アイテム（未選択）のロウ */
    .rand-row-muted { opacity: 0.38; }
    .rand-row-muted .rand-icon { filter: grayscale(1); }

    /* 排他グループのヒント */
    .exclusive-hint {
      background: var(--orange-bg);
      border-radius: var(--r-sm);
      padding: 8px 12px;
      font-size: 11.5px;
      color: var(--orange-d);
      margin-bottom: 8px;
      line-height: 1.5;
      display: flex; gap: 5px; align-items: flex-start;
    }
    .exclusive-divider {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--orange-d); opacity: 0.7;
      padding: 6px 4px 4px;
    }

    .save-row {
      display: flex; gap: 8px; margin-top: 14px; align-items: center;
    }
    .save-row .form-input { flex: 1; }
    .save-small-btn {
      background: var(--blue); color: #fff; border-radius: var(--r-sm);
      padding: 10px 16px; font-size: 14px; font-weight: 600;
      font-family: inherit; white-space: nowrap; flex-shrink: 0;
    }

    .action-row { display: flex; gap: 10px; margin-top: 14px; }
    .action-btn {
      flex: 1; padding: 12px; border-radius: var(--r-sm);
      font-size: 14px; font-weight: 600; font-family: inherit;
    }
    .action-btn.primary   { background: var(--blue); color: #fff; }
    .action-btn.secondary { background: var(--bg); color: var(--text); }
    .action-btn.full      { width: 100%; }
    .action-btn.twitter   { background: #000; color: #fff; }

    /* ── My Coord list ──────────────────────────── */
    .coord-card {
      background: var(--bg); border-radius: var(--r-sm);
      padding: 14px; margin-bottom: 10px;
    }
    .coord-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 10px;
    }
    .coord-title    { font-size: 15px; font-weight: 700; }
    .coord-actions  { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
    .coord-icon-btn {
      font-size: 16px; padding: 5px 6px; border-radius: 8px;
      color: var(--text-2); line-height: 1;
      transition: background 0.12s ease;
    }
    .coord-icon-btn:active { background: var(--sep); }
    .coord-del      { color: var(--text-3); }
    .coord-rows     { display: flex; flex-direction: column; gap: 5px; }
    .coord-item-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .coord-cat      { color: var(--text-2); width: 110px; flex-shrink: 0; font-size: 12px; }
    .coord-iname    { font-weight: 500; }

    /* ── Create form ────────────────────────────── */
    .form-field  { margin-bottom: 14px; }
    .form-label  { font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; display: block; }
    .form-input {
      width: 100%; background: var(--bg); border: none;
      border-radius: var(--r-sm); padding: 10px 12px;
      font-size: 14px; color: var(--text); font-family: inherit;
      outline: none; box-sizing: border-box;
    }
    .cat-sel-row   { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .cat-sel-label { font-size: 13px; width: 112px; flex-shrink: 0; }
    .cat-sel {
      flex: 1; background: var(--bg); border: none;
      border-radius: var(--r-sm); padding: 8px 10px;
      font-size: 13px; color: var(--text); font-family: inherit; outline: none;
    }
    .cat-sel:disabled { opacity: 0.4; }

    /* ── Export card（画像保存用・非表示要素） ──── */
    .export-card {
      position: fixed; left: -9999px; top: 0;
      width: 560px;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans',
                   'Noto Sans JP', sans-serif;
      background: linear-gradient(135deg, var(--orange-d) 0%, var(--orange) 55%, #FFBB00 100%);
      padding: 28px;
      border-radius: 28px;
      box-sizing: border-box;
    }
    .exp-brand {
      color: #fff; font-size: 12px; font-weight: 600;
      opacity: 0.85; letter-spacing: 0.3px; margin-bottom: 6px;
    }
    .exp-title {
      color: #fff; font-size: 21px; font-weight: 700; margin-bottom: 18px;
    }
    .exp-body { background: #fff; border-radius: 18px; padding: 4px 18px; }
    .exp-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 0.5px solid var(--sep);
    }
    .exp-row:last-child { border-bottom: none; }
    .exp-icon {
      width: 34px; height: 34px; background: var(--bg);
      border-radius: 9px; display: flex; align-items: center;
      justify-content: center; font-size: 17px; flex-shrink: 0;
    }
    .exp-info { flex: 1; min-width: 0; }
    .exp-cat  { font-size: 10.5px; color: var(--text-2); }
    .exp-name { font-size: 13.5px; font-weight: 600; color: var(--text); margin-top: 1px; }

    .exp-hero { text-align: center; padding: 6px 0 18px; }
    .exp-hero-pct {
      color: #fff; font-size: 52px; font-weight: 800;
      letter-spacing: -1px; line-height: 1;
    }
    .exp-hero-label {
      color: rgba(255,255,255,0.85); font-size: 12px;
      margin-top: 6px; letter-spacing: 0.5px;
    }
    .exp-hero-nums { color: #fff; font-size: 13px; margin-top: 10px; opacity: 0.92; }

    .exp-cat-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
      background: #fff; border-radius: 18px; padding: 14px;
    }
    .exp-cat-cell { background: var(--bg); border-radius: 12px; padding: 10px 6px; text-align: center; }
    .exp-cat-cell-icon { font-size: 17px; }
    .exp-cat-cell-pct  { font-size: 13px; font-weight: 700; color: var(--orange); margin-top: 3px; }
    .exp-cat-cell-pct.high  { color: var(--green); }
    .exp-cat-cell-pct.empty { color: var(--text-3); }
    .exp-cat-cell-name {
      font-size: 8.5px; color: var(--text-2); margin-top: 3px;
      line-height: 1.3; word-break: break-all;
    }

    /* ── Empty / toast ──────────────────────────── */
    .empty-msg {
      text-align: center; color: var(--text-2); font-size: 13px;
      line-height: 1.8; padding: 28px 0;
    }
    .toast {
      position: fixed; bottom: 100px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(0,0,0,0.75); color: #fff;
      font-size: 13px; font-weight: 500; padding: 10px 20px;
      border-radius: 20px; z-index: 2000; opacity: 0;
      transition: all 0.25s ease; white-space: nowrap; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Responsive ────────────────────────────── */
    @media (min-width: 600px) {
      .cat-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 380px) {
      .cat-grid { grid-template-columns: 1fr; }
      .banner-nums { gap: 16px; }
      .bnum-val { font-size: 22px; }
    }
  </style>
</head>
<body>

<!-- ▸ Navigation bar -->
<nav>
  <div class="nav-title">🗂️ Skyドレスアップアイテム所持率管理</div>
  <div style="display:flex; gap:10px; align-items:center;">
    <button class="sb-toggle-btn" onclick="toggleSidebar()">☰ ツール</button>
    <button class="nav-action" onclick="loadAndRender()">更新</button>
  </div>
</nav>

<!-- ▸ Sidebar overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- ▸ App layout -->
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;">
      <div class="sb-label" style="margin-bottom: 0;">🔗 関連ツール</div>
      <button class="sb-close-btn" onclick="closeSidebar()">×</button>
    </div>
    <div class="sb-nav">
      <a href="https://taipak5000.github.io/skyzztai.management.tool/" class="sb-link current">🕯️ キャンドル計算機</a>
      <a href="https://taipak5000.github.io/companion/" class="sb-link">✨ 精霊同行ツール</a>
      <a href="https://taipak5000.github.io/share/" class="sb-link">📍 創作物管理ツール</a>
      <a href="https://taipak5000.github.io/item/" class="sb-link">🗂️ アイテム所持管理</a>
    </div>
  </aside>

  <div class="wrap">

  <!-- ▸ Overall rate banner -->
  <p class="sec-label">全体の達成率</p>

  <div class="banner">
    <div class="banner-inner">

      <div class="gauge-wrap">
        <svg class="gauge-svg" viewBox="0 0 96 96">
          <circle class="g-track" cx="48" cy="48" r="38"/>
          <circle class="g-fill"  cx="48" cy="48" r="38" id="gFill"/>
        </svg>
        <div class="gauge-center">
          <div class="gauge-pct" id="oPct">--%</div>

<script>
/* ── Category list ──────────────────────── */
const CATS = [
  { key:'outfit',          name:'アウトフィット',         file:'outfit.html',          icon:'🧥' },
  { key:'shoes',           name:'シューズ',               file:'shoes.html',           icon:'👟' },
  { key:'mask',            name:'マスク',                 file:'mask.html',            icon:'🎭' },
  { key:'face_accessory',  name:'フェイスアクセサリー',   file:'face_accessory.html',  icon:'💎' },
  { key:'necklace',        name:'ネックレス',             file:'necklace.html',        icon:'📿' },
  { key:'hairstyle',       name:'ヘアスタイル',           file:'hairstyle.html',       icon:'💇' },
  { key:'hair_accessory',  name:'ヘアアクセサリー',       file:'hair_accessory.html',  icon:'👒' },
  { key:'head_accessory',  name:'ヘッドアクセサリー',     file:'head_accessory.html',  icon:'🎧' },
  { key:'cape',            name:'ケープ',                 file:'cape.html',            icon:'🪽‪' },
  { key:'portable_item',   name:'持ち運べるアイテム',     file:'portable_item.html',   icon:'🎹' },
  { key:'small_placeable', name:'小さい設置アイテム',     file:'small_placeable.html', icon:'🏮' },
  { key:'large_placeable', name:'大きい設置アイテム',     file:'large_placeable.html', icon:'🏛️' },
];

const LS     = 'gameItems_';
const CIRC   = 2 * Math.PI * 38; // ≈ 238.8

// 排他グループ: このうちどれか1つしか同時に装備できない
const EXCLUSIVE_KEYS = ['portable_item', 'small_placeable', 'large_placeable'];

/* ── Read localStorage ─────────────────── */
function readCat(key) {
  try {
    const d = JSON.parse(localStorage.getItem(LS + key));
    if (d && typeof d.total === 'number' && d.total > 0) return d;
  } catch(_) {}
  return null;
}

function pct(owned, total) {
  return total > 0 ? Math.round(owned / total * 100) : null;
}

/* ── Card HTML ─────────────────────────── */
function cardHTML(cat, data) {
  const p    = data ? pct(data.owned, data.total) : null;
  const high = p !== null && p >= 80;
  const cls  = p === null ? 'empty' : high ? 'high' : '';
  const pTxt = p !== null ? p + '%' : '--';
  const cTxt = data ? `${data.owned} / ${data.total}` : '未登録';

  return `
    <a class="cat-card" href="${cat.file}">
      <div class="cat-top">
        <div class="cat-icon-wrap">
          <div class="cat-icon">${cat.icon}</div>
          <div class="cat-name">${cat.name}</div>
        </div>
        <span class="cat-pct ${cls}">${pTxt}</span>
      </div>
      <div class="cat-bar">
        <div class="cat-fill ${high ? 'high' : ''}"
             style="width:0%" data-target="${p ?? 0}"></div>
      </div>
      <div class="cat-bottom">
        <span class="cat-count">${cTxt}</span>
        <span class="cat-chevron">›</span>
      </div>
    </a>`;
}

/* ── Main render ───────────────────────── */
function loadAndRender() {
  let own = 0, tot = 0, active = 0;

  const html = CATS.map(c => {
    const d = readCat(c.key);
    if (d) { own += d.owned; tot += d.total; active++; }
    return cardHTML(c, d);
  }).join('');

  document.getElementById('catGrid').innerHTML = html;

  const p = pct(own, tot);

  document.getElementById('oPct').textContent   = p !== null ? p + '%' : '--%';
  document.getElementById('sOwned').textContent = tot > 0 ? own : '--';
  document.getElementById('sTotal').textContent = tot > 0 ? tot : '--';
  document.getElementById('catLabel').textContent =
    'カテゴリ一覧' + (active > 0 ? `（${active}/${CATS.length} 登録済み）` : '');

  /* Gauge animation */
  const fill = document.getElementById('gFill');
  fill.style.strokeDasharray  = CIRC;
  fill.style.strokeDashoffset = CIRC;

  requestAnimationFrame(() => {
    fill.style.strokeDashoffset = p !== null ? CIRC * (1 - p / 100) : CIRC;
    document.querySelectorAll('.cat-fill').forEach(el => {
      el.style.width = el.dataset.target + '%';
    });
  });
}

/* ── Init ──────────────────────────────── */
document.addEventListener('DOMContentLoaded', loadAndRender);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) loadAndRender();
});
// 戻るボタンや他ページからの遷移でも確実に再取得
window.addEventListener('pageshow', (e) => {
  if (e.persisted) loadAndRender();
});
/* ── Sidebar ────────────────────────────── */
function toggleSidebar() {
  const s = document.getElementById('sidebar');
  const o = document.getElementById('sidebarOverlay');
  const open = s.classList.contains('sidebar-open');
  s.classList.toggle('sidebar-open', !open);
  o.classList.toggle('visible', !open);
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('sidebar-open');
  document.getElementById('sidebarOverlay').classList.remove('visible');
}

/* ================================================================
   コーデ機能
   ================================================================ */

// カテゴリの所持アイテム（名前付き）をLocalStorageから取得
function getOwnedItemsForCat(catKey) {
  try {
    const d = JSON.parse(localStorage.getItem('gameItems_' + catKey));
    return d?.ownedItems || [];
  } catch { return []; }
}

// モーダル開閉
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ── ランダムコーデ ────────────────────────────
let currentRandom = {};

function openRandomCoord() {
  currentRandom = {};
  hideSaveRow();
  openModal('randomModal');
  shuffleOutfit();
}

function shuffleOutfit() {
  currentRandom = {};
  const el = document.getElementById('randomResult');
  let html = '';
  let hasAny = false;

  // 排他グループから所持アイテムがあるカテゴリを絞り込み、1つだけランダム選択
  const exclusiveWithItems = EXCLUSIVE_KEYS.filter(key => getOwnedItemsForCat(key).length > 0);
  const chosenExclusiveKey = exclusiveWithItems.length > 0
    ? exclusiveWithItems[Math.floor(Math.random() * exclusiveWithItems.length)]
    : null;

  CATS.forEach(cat => {
    const isExclusive = EXCLUSIVE_KEYS.includes(cat.key);

    // 排他グループのうち選ばれなかったカテゴリはグレーアウト表示
    if (isExclusive && cat.key !== chosenExclusiveKey) {
      html += `
        <div class="rand-row rand-row-muted">
          <div class="rand-icon">${cat.icon}</div>
          <div class="rand-info">
            <div class="rand-cat">${cat.name}</div>
            <div class="rand-empty">このコーデでは使用しない</div>
          </div>
        </div>`;
      return;
    }

    const owned = getOwnedItemsForCat(cat.key);
    let picked = null;
    if (owned.length > 0) {
      picked = owned[Math.floor(Math.random() * owned.length)];
      currentRandom[cat.key] = picked;
      hasAny = true;
    }
    html += `
      <div class="rand-row">
        <div class="rand-icon">${cat.icon}</div>
        <div class="rand-info">
          <div class="rand-cat">${cat.name}</div>
          ${picked
            ? `<div class="rand-name">${picked.name}</div>`
            : `<div class="rand-empty">所持アイテムなし</div>`}
        </div>
      </div>`;
  });

  if (!hasAny) {
    html = `<div class="empty-msg">各カテゴリページで所持チェックをすると<br>ここにランダムコーデが表示されます。</div>`;
  }
  el.innerHTML = html;
  hideSaveRow();
}

function hideSaveRow() {
  document.getElementById('saveRow').style.display = 'none';
  document.getElementById('saveCoordName').value = '';
}

function toggleSaveRow() {
  const row = document.getElementById('saveRow');
  const isHidden = row.style.display === 'none';
  row.style.display = isHidden ? 'flex' : 'none';
  if (isHidden) document.getElementById('saveCoordName').focus();
}

function confirmSaveRandom() {
  const name = document.getElementById('saveCoordName').value.trim();
  if (!name) { document.getElementById('saveCoordName').focus(); return; }
  if (Object.keys(currentRandom).length === 0) return;

  const sets = getSavedCoords();
  sets.push({ id: Date.now(), name, items: currentRandom, createdAt: new Date().toISOString() });
  localStorage.setItem('myCoords', JSON.stringify(sets));

  hideSaveRow();
  showToast(`「${name}」を保存しました！`);
}

// ── マイコーデ ────────────────────────────────
function getSavedCoords() {
  try { return JSON.parse(localStorage.getItem('myCoords')) || []; }
  catch { return []; }
}

function openMyCoord() {
  showCoordList();
  openModal('myCoordModal');
}

function showCoordList() {
  document.getElementById('myCoordListView').style.display = 'block';
  document.getElementById('myCoordCreateView').style.display = 'none';
  renderMyCoordList();
}

function showCreateForm() {
  document.getElementById('myCoordListView').style.display = 'none';
  document.getElementById('myCoordCreateView').style.display = 'block';
  buildCreateForm();
}

function renderMyCoordList() {
  const sets = getSavedCoords();
  const el = document.getElementById('myCoordList');

  if (sets.length === 0) {
    el.innerHTML = `<div class="empty-msg">保存されたコーデはありません。<br>ランダムコーデから保存するか、<br>新規作成してください。</div>`;
    return;
  }

  el.innerHTML = sets.map(set => {
    const rows = Object.entries(set.items).map(([catKey, item]) => {
      const cat = CATS.find(c => c.key === catKey);
      if (!cat || !item) return '';
      return `<div class="coord-item-row">
        <span class="coord-cat">${cat.icon} ${cat.name}</span>
        <span class="coord-iname">${item.name}</span>
      </div>`;
    }).join('');

    return `
      <div class="coord-card">
        <div class="coord-header">
          <div class="coord-title">👗 ${set.name}</div>
          <div class="coord-actions">
            <button class="coord-icon-btn" onclick="saveMyCoordAsImage(${set.id})" title="画像で保存">🖼️</button>
            <button class="coord-icon-btn" onclick="shareMyCoordOnTwitter(${set.id})" title="Xでシェア">📤</button>
            <button class="coord-icon-btn coord-del" onclick="deleteCoord(${set.id})" title="削除">🗑</button>
          </div>
        </div>
        <div class="coord-rows">${rows}</div>
      </div>`;
  }).join('');
}

function deleteCoord(id) {
  if (!confirm('このコーデを削除しますか？')) return;
  const sets = getSavedCoords().filter(s => s.id !== id);
  localStorage.setItem('myCoords', JSON.stringify(sets));
  renderMyCoordList();
}

function buildCreateForm() {
  const el = document.getElementById('catSelects');
  el.innerHTML = CATS.map(cat => {
    const owned = getOwnedItemsForCat(cat.key);
    const disabled = owned.length === 0;
    const opts = disabled
      ? `<option value="">（所持アイテムなし）</option>`
      : `<option value="">選択しない</option>` +
        owned.map(i => `<option value="${i.id}">${i.name}</option>`).join('');

    // 排他グループの先頭にヒントを挿入
    const prefix = cat.key === EXCLUSIVE_KEYS[0]
      ? `<div class="exclusive-hint">⚠️ 以下3カテゴリはどれか1つのみ選択できます</div>`
      : '';

    return `${prefix}<div class="cat-sel-row">
        <div class="cat-sel-label">${cat.icon} ${cat.name}</div>
        <select class="cat-sel" id="sel_${cat.key}" ${disabled ? 'disabled' : ''}
          ${EXCLUSIVE_KEYS.includes(cat.key) ? 'data-exclusive="true"' : ''}>${opts}</select>
      </div>`;
  }).join('');

  // 排他グループにイベントリスナーを設定
  EXCLUSIVE_KEYS.forEach(key => {
    const sel = document.getElementById('sel_' + key);
    if (sel && !sel.disabled) {
      sel.addEventListener('change', handleExclusiveChange);
    }
  });
}

// 排他セレクト変更時: 値が入ったら他の排他セレクトを無効化・クリア
function handleExclusiveChange(e) {
  const changedKey = e.target.id.replace('sel_', '');
  if (!EXCLUSIVE_KEYS.includes(changedKey)) return;
  const hasValue = e.target.value !== '';

  EXCLUSIVE_KEYS.forEach(key => {
    if (key === changedKey) return;
    const sel = document.getElementById('sel_' + key);
    if (!sel) return;
    // 所持アイテムなしで元から disabled のものはそのまま
    if (getOwnedItemsForCat(key).length === 0) return;
    sel.disabled = hasValue;
    if (hasValue) sel.value = '';
  });
}

function saveCreatedCoord() {
  const name = document.getElementById('newCoordName').value.trim();
  if (!name) { showToast('コーデ名を入力してください'); document.getElementById('newCoordName').focus(); return; }

  const items = {};
  CATS.forEach(cat => {
    const sel = document.getElementById(`sel_${cat.key}`);
    if (sel && sel.value) {
      const owned = getOwnedItemsForCat(cat.key);
      const item = owned.find(i => i.id === sel.value);
      if (item) items[cat.key] = item;
    }
  });

  if (Object.keys(items).length === 0) { showToast('最低1つのアイテムを選択してください'); return; }

  const sets = getSavedCoords();
  sets.push({ id: Date.now(), name, items, createdAt: new Date().toISOString() });
  localStorage.setItem('myCoords', JSON.stringify(sets));

  document.getElementById('newCoordName').value = '';
  showToast(`「${name}」を保存しました！`);
  showCoordList();
}

/* ================================================================
   画像保存・Xシェア機能
   ================================================================ */

// ⚠️ サイト公開URLが決まったらここを差し替えてください
const SITE_URL = 'INDEX';

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function sanitizeFilename(str) {
  return String(str).replace(/[\\/:*?"<>|]/g, '_').trim() || 'coord';
}

// html2canvasを必要になった時点で読み込む（未読み込みの場合のみ）
let html2canvasLoading = null;
function ensureHtml2Canvas() {
  if (window.html2canvas) return Promise.resolve();
  if (html2canvasLoading) return html2canvasLoading;
  html2canvasLoading = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload = () => resolve();
    s.onerror = () => { html2canvasLoading = null; reject(new Error('html2canvas load failed')); };
    document.head.appendChild(s);
  });
  return html2canvasLoading;
}

// コーデ内容から画像保存用のカード（画面外）を生成
function buildExportCardEl(title, items) {
  const rows = CATS.map(cat => {
    const item = items[cat.key];
    if (!item) return '';
    return `
      <div class="exp-row">
        <div class="exp-icon">${cat.icon}</div>
        <div class="exp-info">
          <div class="exp-cat">${cat.name}</div>
          <div class="exp-name">${escapeHtml(item.name)}</div>
        </div>
      </div>`;
  }).join('');

  const card = document.createElement('div');
  card.className = 'export-card';
  card.innerHTML = `
    <div class="exp-brand">🗂️ Skyドレスアップアイテム所持率管理</div>
    <div class="exp-title">${escapeHtml(title)}</div>
    <div class="exp-body">${rows}</div>
  `;
  document.body.appendChild(card);
  return card;
}

// 指定したカード生成関数の出力を画像として書き出し、ダウンロードする（共通処理）
async function exportElementAsImage(buildCardFn, filenameBase) {
  showToast('画像を生成中…');
  let card = null;
  try {
    await ensureHtml2Canvas();
    card = buildCardFn();
    const canvas = await html2canvas(card, { backgroundColor: null, scale: 2 });
    const link = document.createElement('a');
    link.download = sanitizeFilename(filenameBase) + '.png';
    link.href = canvas.toDataURL('image/png');
    document.body.appendChild(link);
    link.click();
    link.remove();
    showToast('画像を保存しました！');
  } catch (err) {
    console.error(err);
    showToast('画像の保存に失敗しました');
  } finally {
    if (card) card.remove();
  }
}

// コーデを画像として書き出し、ダウンロードする
function saveCoordAsImage(title, items, filenameBase) {
  if (!items || Object.keys(items).length === 0) {
    showToast('コーデが選択されていません');
    return;
  }
  return exportElementAsImage(() => buildExportCardEl(title, items), filenameBase);
}

// コーデ内容からツイート本文を作成（文末に必ずサイトURLを付与）
function buildCoordTweetText(label, items) {
  const lines = CATS
    .map(cat => {
      const item = items[cat.key];
      return item ? `${cat.icon} ${item.name}` : null;
    })
    .filter(Boolean);
  return `${label}のコーデ\n\n${lines.join('\n')}\n\n${SITE_URL}`;
}

// Xの投稿画面（Web Intent）を新規タブで開く（共通処理）
function openTwitterIntent(text) {
  const intentUrl = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text);
  window.open(intentUrl, '_blank', 'noopener,noreferrer');
}

function shareCoordOnTwitterIntent(label, items) {
  if (!items || Object.keys(items).length === 0) {
    showToast('コーデが選択されていません');
    return;
  }
  openTwitterIntent(buildCoordTweetText(label, items));
}

// ── ランダムコーデ: 画像保存・Xシェア ──────────
function saveRandomAsImage() {
  return saveCoordAsImage('🎲 ランダムコーデ', currentRandom, 'random-coord');
}

function shareRandomOnTwitter() {
  return shareCoordOnTwitterIntent('ランダムコーデ', currentRandom);
}

// ── マイコーデ: 画像保存・Xシェア ──────────────
function saveMyCoordAsImage(id) {
  const set = getSavedCoords().find(s => s.id === id);
  if (!set) return;
  return saveCoordAsImage(`👗 ${set.name}`, set.items, set.name);
}

function shareMyCoordOnTwitter(id) {
  const set = getSavedCoords().find(s => s.id === id);
  if (!set) return;
  return shareCoordOnTwitterIntent(set.name, set.items);
}

// ── 総合達成率: 画像保存・Xシェア ──────────────
function getOverallStats() {
  let own = 0, tot = 0;
  CATS.forEach(cat => {
    const d = readCat(cat.key);
    if (d) { own += d.owned; tot += d.total; }
  });
  return { own, tot, p: pct(own, tot) };
}

// 全体の達成率＋カテゴリ別所持率カード（画面外）を生成
function buildOverallExportCardEl() {
  const { own, tot, p } = getOverallStats();
  const pctTxt = p !== null ? p + '%' : '--%';

  const cells = CATS.map(cat => {
    const d  = readCat(cat.key);
    const cp = d ? pct(d.owned, d.total) : null;
    const high = cp !== null && cp >= 80;
    const cls  = cp === null ? 'empty' : high ? 'high' : '';
    const cpTxt = cp !== null ? cp + '%' : '--';
    return `
      <div class="exp-cat-cell">
        <div class="exp-cat-cell-icon">${cat.icon}</div>
        <div class="exp-cat-cell-pct ${cls}">${cpTxt}</div>
        <div class="exp-cat-cell-name">${cat.name}</div>
      </div>`;
  }).join('');

  const card = document.createElement('div');
  card.className = 'export-card';
  card.innerHTML = `
    <div class="exp-brand">🗂️ Skyドレスアップアイテム所持率管理</div>
    <div class="exp-hero">
      <div class="exp-hero-pct">${pctTxt}</div>
      <div class="exp-hero-label">コレクション達成率</div>
      <div class="exp-hero-nums">所持中 ${tot > 0 ? own : '--'} ／ 総アイテム数 ${tot > 0 ? tot : '--'}</div>
    </div>
    <div class="exp-cat-grid">${cells}</div>
  `;
  document.body.appendChild(card);
  return card;
}

function saveOverallAsImage() {
  if (getOverallStats().tot === 0) {
    showToast('まずはカテゴリページでアイテムを登録してください');
    return;
  }
  return exportElementAsImage(buildOverallExportCardEl, 'コレクション達成率');
}

// 達成率からツイート本文を作成（文末に必ずサイトURLを付与）
function buildOverallTweetText() {
  const { own, tot, p } = getOverallStats();
  const pctTxt = p !== null ? p + '%' : '--%';
  return `Skyドレスアップアイテム所持率は${pctTxt}でした！\n（所持中 ${own} ／ 総アイテム数 ${tot}）\nあなたは何%持ってる？✨\n\n${SITE_URL}`;
}

function shareOverallOnTwitter() {
  if (getOverallStats().tot === 0) {
    showToast('まずはカテゴリページでアイテムを登録してください');
    return;
  }
  openTwitterIntent(buildOverallTweetText());
}

// ── Toast ──────────────────────────────────────
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2600);
}
