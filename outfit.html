<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カテゴリ別アイテムチェック - Sky所持率管理</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Design tokens (総合メニューと完全統一) ──────────────── */
    :root {
      --bg:        #F2F2F7;
      --card:      #FFFFFF;
      --sep:       rgba(60,60,67,0.12);
      --orange:    #FF9500;
      --orange-d:  #FF6200;
      --orange-bg: rgba(255,149,0,0.10);
      --blue:      #007AFF;
      --blue-bg:   rgba(0,122,255,0.08);
      --green:     #34C759;
      --green-bg:  rgba(52,199,89,0.10);
      --text:      #1C1C1E;
      --text-2:    #8E8E93;
      --text-3:    #C7C7CC;
      --r:         16px;
      --r-sm:      10px;
    }

    /* ── Reset & Body ─────────────────────────────────── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    a { text-decoration:none; color:inherit; -webkit-tap-highlight-color:transparent; }
    button { cursor:pointer; border:none; background:none; font-family:inherit; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 60px;
    }

    /* ── Navigation bar ────────────────────────── */
    nav {
      position: sticky; top: 0; z-index: 20;
      background: rgba(242,242,247,0.88); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 0.5px solid var(--sep); padding: 14px 20px 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-title { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
    .nav-back { color: var(--blue); font-size: 15px; font-weight: 500; display: flex; align-items: center; gap: 4px; }

    /* ── Layout ───────────────────────── */
    .app-layout { max-width: 720px; margin: 0 auto; padding: 0 16px; }
    @media (min-width: 850px) { .app-layout { max-width: 960px; display: flex; gap: 20px; align-items: flex-start; } }
    .wrap { flex: 1; min-width: 0; }

    /* ── Sidebar (総合メニュー互換) ──────────────── */
    .sidebar {
      width: 200px; flex-shrink: 0; position: sticky; top: 58px;
      background: var(--card); border-radius: var(--r); padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07); display: none; margin-top: 22px;
    }
    @media (min-width: 850px) { .sidebar { display: block; } }
    .sidebar-section-label { font-size: 11px; font-weight: 700; color: var(--text-2); margin-bottom: 8px; text-transform: uppercase; }
    .sidebar-nav-link {
      display: flex; align-items: center; gap: 9px; padding: 9px 12px; border-radius: var(--r-sm);
      color: var(--text); font-size: 13.5px; font-weight: 500; margin-bottom: 2px;
    }
    .sidebar-nav-link:hover { background: var(--bg); }
    .sidebar-nav-link.current-tool { background: var(--orange-bg); color: var(--orange); font-weight: 700; }

    /* ── Category Header Banner ─────────────────── */
    .cat-header-card {
      background: var(--card); border-radius: var(--r); padding: 20px; margin-top: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07); display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .cat-header-info { display: flex; align-items: center; gap: 12px; }
    .cat-header-icon { width: 44px; height: 44px; background: var(--bg); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .cat-header-name { font-size: 18px; font-weight: 700; }
    .cat-header-count { font-size: 13px; color: var(--text-2); margin-top: 2px; }
    .cat-header-pct { font-size: 24px; font-weight: 800; color: var(--orange); }

    /* ── Filter / Sort Section ─────────────────── */
    .control-panel {
      background: var(--card); border-radius: var(--r); padding: 16px; margin-top: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07); display: flex; flex-direction: column; gap: 12px;
    }
    .control-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .control-label { font-size: 12px; font-weight: 600; color: var(--text-2); min-width: 60px; }
    .select-box {
      background: var(--bg); border: none; padding: 8px 12px; border-radius: var(--r-sm);
      font-size: 13px; color: var(--text); font-weight: 500; outline: none; flex: 1; min-width: 120px;
    }

    /* ── Item List ────────────────────────────── */
    .sec-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-2); padding: 22px 4px 8px; }
    .item-list { display: flex; flex-direction: column; gap: 8px; }
    
    /* Item Card */
    .item-card {
      background: var(--card); border-radius: var(--r); padding: 14px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07); display: flex; align-items: center; justify-content: space-between; gap: 12px;
      transition: background 0.2s;
    }
    .item-card.is-owned { background: rgba(52,199,89,0.03); }
    .item-left { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }
    
    /* Checkbox Custom */
    .check-btn {
      width: 24px; height: 24px; border: 2px solid var(--text-3); border-radius: 6px;
      display: flex; align-items: center; justify-content: center; color: transparent; transition: all 0.15s; flex-shrink: 0;
    }
    .item-card.is-owned .check-btn { background: var(--green); border-color: var(--green); color: #fff; }
    
    /* Item Details */
    .item-details { flex: 1; min-width: 0; }
    .item-name-link {
      font-size: 15px; font-weight: 600; color: var(--text); display: inline-block;
      max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .item-name-link:hover { color: var(--blue); text-decoration: underline; }
    .item-meta-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    
    /* Badges */
    .badge { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; background: var(--bg); color: var(--text-2); }
    .badge.premium { background: rgba(255,149,0,0.12); color: var(--orange-d); }
    .badge.free { background: rgba(0,122,255,0.1); color: var(--blue); }
    .badge.dye-o { background: rgba(52,199,89,0.12); color: var(--green); }
    
    /* Fav Button */
    .fav-btn { font-size: 20px; color: var(--text-3); padding: 4px; transition: transform 0.1s; flex-shrink: 0; }
    .fav-btn:active { transform: scale(1.2); }
    .fav-btn.is-fav { color: #FFCC00; text-shadow: 0 0 2px rgba(255,180,0,0.4); }

    /* Empty state */
    .empty-message { text-align: center; padding: 40px; color: var(--text-2); font-size: 14px; background: var(--card); border-radius: var(--r); }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-back">◀ 総合メニュー</a>
  <div class="nav-title" id="pageTitle">アイテム所持チェック</div>

<div class="app-layout">

  <aside class="sidebar">
    <div class="sidebar-section-label">🗂️ カテゴリメニュー</div>
    <nav>
      <a href="index.html" class="sidebar-nav-link">🏠 総合メニューに戻る</a>
    </nav>

  <div class="wrap">

    <div class="cat-header-card">
      <div class="cat-header-info">
        <div class="cat-header-icon" id="catIcon">📦</div>
        <div>
          <div class="cat-header-name" id="catName">カテゴリ名</div>

    <div class="control-panel">

        <span class="control-label">絞り込み</span>
        <select class="select-box" id="filterStatus" onchange="filterAndRender()">

        <select class="select-box" id="filterFav" onchange="filterAndRender()">

        </select>
      </div>
      
      <div class="control-row">
        <span class="control-label">属性・条件</span>

        <select class="select-box" id="filterDye" onchange="filterAndRender()">

      </div>

      <div class="control-row">
        <span class="control-label">その他</span>
        <select class="select-box" id="filterEvent" onchange="filterAndRender()">

          </select>
        <select class="select-box" id="sortOrder" onchange="filterAndRender()">

          <option value="event">イベント名順</option>
        </select>
      </div>
    </div>

    <p class="sec-label" id="listLabel">アイテム一覧</p>
    <div class="item-list" id="itemList">
      </div>

  </div></div><script>

  { id: 'outfit_028', name: 'キズナアイの服', event: 'キズナアイコラボ', cost: 'premium', dye: false },

  // ── 日々イベント（D / D*） ──
  { id: 'outfit_035', name: 'いたずらウィッチジャンパースカート', event: 'いたずらな日々', cost: 'premium', dye: false },
  { id: 'outfit_036', name: 'いたずらスパイダー・キルト', event: 'いたずらな日々', cost: 'premium', dye: true },

  { id: 'outfit_038', name: 'うさぎのあったかケープパック服', event: '来福の日々', cost: 'premium', dye: false },
  { id: 'outfit_039', name: '花笑むパープルのチュニック', event: '花笑む日々', cost: 'free', dye: true },
  { id: 'outfit_040', name: '花笑むピンクのチュニック', event: '花笑む日々', cost: 'premium', dye: true },

  // ── ワンジー（繋ぎ服） ──
  { id: 'outfit_046', name: '想いを編む季節の案内人の服（究極）', event: '想いを編む季節', cost: 'premium', dye: false },

  { id: 'outfit_049', name: '砕ける闇の光の服', event: '砕ける闇の季節', cost: 'free', dye: false },
  { id: 'outfit_050', name: '砕ける闇の闇の服', event: '砕ける闇の季節', cost: 'free', dye: false },
];
/* ========================================================================== */

const LS_KEY = 'gameItems_' + CAT_KEY;
let userStates = { owned: {}, fav: {} };

// 初期化処理
document.addEventListener('DOMContentLoaded', () => {
  // タイトル等UIの書き換え
  document.title = `${CAT_INFO.name}所持チェック - Sky所持率管理`;
  document.getElementById('pageTitle').textContent = `🗂️ ${CAT_INFO.name}チェック`;
  document.getElementById('catName').textContent = CAT_INFO.name;
  document.getElementById('catIcon').textContent = CAT_INFO.icon;

  // ローカルストレージからユーザーデータを復元
  loadUserData();
  // イベントの絞り込みセレクトボックスを構築
  buildEventFilter();
  // アイテムリストの表示
  filterAndRender();
});

// ユーザーデータの読み込み
function loadUserData() {
  try {
    const saved = localStorage.getItem(LS_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      // 旧バージョン互換性およびデータ構造担保
      userStates.owned = parsed.itemOwned || {};
      userStates.fav = parsed.itemFav || {};
    }
  } catch (e) {
    console.error("データ読み込み失敗:", e);
  }
}

// ユーザーデータの保存
function saveUserData() {
  // 現実の所持数と総数を計算
  const total = ITEMS_DATA.length;
  const owned = ITEMS_DATA.filter(item => userStates.owned[item.id]).length;

  const dataToSave = {
    total: total,
    owned: owned,
    itemOwned: userStates.owned, // 状態維持用
    itemFav: userStates.fav       // 状態維持用
  };

  localStorage.setItem(LS_KEY, JSON.stringify(dataToSave));
  
  // ヘッダーのパーセンテージ表示をリアルタイム更新
  updateHeaderScore(owned, total);
}

// ヘッダーのスコア表示更新
function updateHeaderScore(owned, total) {
  const pct = total > 0 ? Math.round((owned / total) * 100) : 0;
  document.getElementById('catCount').textContent = `${owned} / ${total} 所持`;
  document.getElementById('catPct').textContent = `${pct}%`;
}

// 重複のないイベントリストを絞り込みボックスに追加
function buildEventFilter() {
  const events = [...new Set(ITEMS_DATA.map(item => item.event))];
  const select = document.getElementById('filterEvent');
  events.forEach(ev => {
    const opt = document.createElement('option');
    opt.value = ev;
    opt.textContent = ev;
    select.appendChild(opt);
  });
}

// 所持チェックの切り替え
function toggleOwned(id) {
  userStates.owned[id] = !userStates.owned[id];
  saveUserData();
  
  // クラスの切り替えだけでスムーズにUIに反映
  const card = document.getElementById(`card_${id}`);
  if (card) {
    card.classList.toggle('is-owned', userStates.owned[id]);
  }
}

// お気に入りチェックの切り替え
function toggleFav(id, btn) {
  userStates.fav[id] = !userStates.fav[id];
  saveUserData();
  
  btn.classList.toggle('is-fav', userStates.fav[id]);
  btn.textContent = userStates.fav[id] ? '★' : '☆';
}

// フィルター・ソートを適用してレンダリング
function filterAndRender() {
  const fStatus = document.getElementById('filterStatus').value;
  const fFav = document.getElementById('filterFav').value;
  const fCost = document.getElementById('filterCost').value;
  const fDye = document.getElementById('filterDye').value;
  const fEvent = document.getElementById('filterEvent').value;
  const sOrder = document.getElementById('sortOrder').value;

  // 1. 絞り込み (Filter)
  let filtered = ITEMS_DATA.filter(item => {
    const isOwned = !!userStates.owned[item.id];
    const isFav = !!userStates.fav[item.id];

    if (fStatus === 'owned' && !isOwned) return false;
    if (fStatus === 'notOwned' && isOwned) return false;
    if (fFav === 'fav' && !isFav) return false;
    if (fCost !== 'all' && item.cost !== fCost) return false;
    if (fDye === 'dye-o' && !item.dye) return false;
    if (fDye === 'dye-x' && item.dye) return false;
    if (fEvent !== 'all' && item.event !== fEvent) return false;

    return true;
  });

  // 2. 並び替え (Sort)
  if (sOrder === 'nameAsc') {
    filtered.sort((a, b) => a.name.localeCompare(b.name, 'ja'));
  } else if (sOrder === 'event') {
    filtered.sort((a, b) => a.event.localeCompare(b.event, 'ja'));
  }

  // 3. 出力 (Render)
  const listEl = document.getElementById('itemList');
  if (filtered.length === 0) {
    listEl.innerHTML = `<div class="empty-message">該当するアイテムが見つかりません。</div>`;
    // 全体数は変わらないため初期ヘッダーだけ更新
    const total = ITEMS_DATA.length;
    const owned = ITEMS_DATA.filter(item => userStates.owned[item.id]).length;
    updateHeaderScore(owned, total);
    return;
  }

  const html = filtered.map(item => {
    const isOwned = !!userStates.owned[item.id];
    const isFav = !!userStates.fav[item.id];
    
    // Fandom Wiki への自動検索用URLを生成
    const wikiUrl = `https://sky-children-of-the-light.fandom.com/ja/wiki/Special:Search?query=${encodeURIComponent(item.name)}`;

    return `
      <div class="item-card ${isOwned ? 'is-owned' : ''}" id="card_${item.id}">
        <div class="item-left" onclick="toggleOwned('${item.id}')" style="cursor:pointer;">
          <div class="check-btn">✔</div>
          <div class="item-details">
            <a href="${wikiUrl}" target="_blank" rel="noopener noreferrer" class="item-name-link" onclick="event.stopPropagation();">
              ${item.name} 🔗
            </a>
            <div class="item-meta-row">
              <span class="badge">${item.event}</span>
              <span class="badge ${item.cost === 'premium' ? 'premium' : 'free'}">${item.cost === 'premium' ? '課金' : '無課金'}</span>
              <span class="badge ${item.dye ? 'dye-o' : ''}">染色 ${item.dye ? '〇' : '✕'}</span>
            </div>
          </div>
        </div>
        <button class="fav-btn ${isFav ? 'is-fav' : ''}" onclick="toggleFav('${item.id}', this)">
          ${isFav ? '★' : '☆'}
        </button>
      </div>
    `;
  }).join('');

  listEl.innerHTML = html;
  
  // スコアの同期
  const total = ITEMS_DATA.length;
  const owned = ITEMS_DATA.filter(item => userStates.owned[item.id]).length;
  updateHeaderScore(owned, total);
}
</script>

</body>
</html>
