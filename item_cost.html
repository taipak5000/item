<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/app-icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Sky所持率管理">
  <meta name="theme-color" content="#FF9500">
  <title>アイテム別コスト - Sky所持率管理</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #F2F2F7;
      --card:      #FFFFFF;
      --sep:       rgba(60,60,67,0.12);
      --orange:    #FF9500;
      --orange-d:  #FF6200;
      --orange-bg: rgba(255,149,0,0.10);
      --blue:      #007AFF;
      --blue-bg:   rgba(0,122,255,0.08);
      --green:     #34C759;
      --green-bg:  rgba(52,199,89,0.10);
      --red:       #FF3B30;
      --red-bg:    rgba(255,59,48,0.10);
      --text:      #1C1C1E;
      --text-2:    #8E8E93;
      --text-3:    #C7C7CC;
      --r:         16px;
      --r-sm:      10px;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    a { text-decoration:none; color:inherit; -webkit-tap-highlight-color:transparent; }
    button { cursor:pointer; border:none; background:none; font-family:inherit; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 60px;
    }

    nav {
      position: sticky; top: 0; z-index: 20;
      background: rgba(242,242,247,0.88); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 0.5px solid var(--sep); padding: 14px 20px 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-title { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
    .nav-back { color: var(--blue); font-size: 15px; font-weight: 500; display: flex; align-items: center; gap: 4px; }

    .app-layout { max-width: 720px; margin: 0 auto; padding: 0 16px; }
    @media (min-width: 850px) { .app-layout { max-width: 960px; display: flex; gap: 20px; align-items: flex-start; } }
    .wrap { flex: 1; min-width: 0; }

    .sidebar {
      width: 200px; flex-shrink: 0; position: sticky; top: 58px;
      background: var(--card); border-radius: var(--r); padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07); display: none; margin-top: 22px;
    }
    @media (min-width: 850px) { .sidebar { display: block; } }
    .sidebar-section-label { font-size: 11px; font-weight: 700; color: var(--text-2); margin-bottom: 8px; text-transform: uppercase; }
    .sidebar-nav-link {
      display: flex; align-items: center; gap: 9px; padding: 9px 12px; border-radius: var(--r-sm);
      color: var(--text); font-size: 13.5px; font-weight: 500; margin-bottom: 2px;
    }
    .sidebar-nav-link:hover { background: var(--bg); }

    .notice-card {
      background: var(--card); border-radius: var(--r); padding: 16px; margin-top: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07); font-size: 13px; color: var(--text-2); line-height: 1.7;
    }
    .notice-card b { color: var(--text); }
    .notice-card a { color: var(--blue); font-weight: 600; }

    .control-panel {
      background: var(--card); border-radius: var(--r); padding: 14px 16px; margin-top: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07); display: flex; align-items: center; gap: 10px;
    }
    .control-label { font-size: 12px; font-weight: 600; color: var(--text-2); flex-shrink: 0; }
    .select-box {
      background: var(--bg); border: none; padding: 8px 12px; border-radius: var(--r-sm);
      font-size: 13px; color: var(--text); font-weight: 500; outline: none; flex: 1;
    }

    .sec-label {
      font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px;
      color: var(--text-2); padding: 22px 4px 8px;
    }

    .item-card {
      background: var(--card); border-radius: var(--r); padding: 14px 16px; margin-bottom: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .item-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
    .item-name { font-size: 14.5px; font-weight: 700; }
    .item-source { font-size: 12px; color: var(--text-2); margin-top: 2px; }
    .item-cost { font-size: 15px; font-weight: 800; color: var(--orange-d); white-space: nowrap; }
    .item-cost.money { color: var(--red); }
    .item-cost.unknown { color: var(--text-3); font-size: 13px; font-weight: 600; }
    .item-badges { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .item-badge {
      font-size: 10.5px; font-weight: 700; padding: 3px 8px; border-radius: 999px;
    }
    .item-badge.dye-yes { background: var(--green-bg); color: var(--green); }
    .item-badge.current { background: var(--blue-bg); color: var(--blue); }
    .item-badge.limited { background: var(--red-bg); color: var(--red); }
    .item-note { font-size: 11.5px; color: var(--text-2); margin-top: 6px; line-height: 1.5; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-back">◀ 総合メニュー</a>
  <div class="nav-title">💴 アイテム別コスト</div>
  <div style="width:75px;"></div>
</nav>

<div class="app-layout">

  <aside class="sidebar">
    <div class="sidebar-section-label">🗂️ メニュー</div>
    <nav>
      <a href="index.html" class="sidebar-nav-link">🏠 総合メニューに戻る</a>
      <a href="cost.html" class="sidebar-nav-link">💰 課金コスト診断</a>
    </nav>
  </aside>

  <div class="wrap">

    <div class="notice-card">
      <a href="https://sky-children-of-the-light.fandom.com/wiki/Shoes" target="_blank" rel="noopener noreferrer">Sky: Children of the Light Wiki（英語版）</a>の「入手方法(Source)」「コスト(Cost)」の一覧表を基に、各アイテムの実際の入手コストをまとめています。<br>
      通貨は<b>キャンドル</b>（通常アイテムの基本通貨）・<b>ハート</b>・<b>実額（$）</b>の3種類があります。実額のアイテムは、他のアイテムとのセット価格になっている場合があります（その場合は注記しています）。<br>
      まずは<b>シューズ</b>のみ対応しています。他のカテゴリは今後追加予定です。
    </div>

    <div class="control-panel">
      <span class="control-label">カテゴリ</span>
      <select class="select-box" id="catSelect" onchange="renderItems()">
        <option value="shoes">シューズ</option>
      </select>
    </div>

    <p class="sec-label" id="listLabel">シューズのコスト一覧</p>
    <div id="itemList">
      <!-- JSで動的に生成 -->
    </div>

  </div><!-- /wrap -->
</div><!-- /.app-layout -->

<script>
/* ================================================================
   カテゴリ別アイテムコストデータ
   Sky Fandom Wiki (英語版) の各カテゴリページ「Available ○○」表より
   ================================================================ */
const ITEM_COST_DATA = {
  shoes: [
    { id: 'shoes_001', name: 'そっと覗く郵便屋　靴', source: '夢かなう季節（季節精霊・過去）', cost: { type: 'candle', value: 36 }, dye: false },
    { id: 'shoes_002', name: '含み笑いのスカウト　靴', source: '大樹に集う季節（季節精霊・過去）', cost: { type: 'candle', value: 32 }, dye: false },
    { id: 'shoes_003', name: '懇願する幼子　靴', source: '追慕の季節（季節精霊・過去）', cost: { type: 'candle', value: 30 }, dye: false },
    { id: 'shoes_004', name: '夜鳥の語り部　靴', source: '瞬きの季節（季節精霊・過去）', cost: { type: 'candle', value: 24 }, dye: false },
    { id: 'shoes_005', name: '寂れたオアシスの面影　靴', source: '復古の季節（季節の存在・過去）', cost: { type: 'candle', value: 22 }, dye: false },
    { id: 'shoes_006', name: '見捨てられた隠れ家の残響　靴', source: '復古の季節（季節の存在・過去）', cost: { type: 'candle', value: 31 }, dye: false },
    { id: 'shoes_007', name: '忘れ去られた楽園のなごり　靴', source: '復古の季節（季節の存在・過去）', cost: { type: 'candle', value: 29 }, dye: false },
    { id: 'shoes_008', name: '栄光のピアニスト　靴', source: '重なる音色の季節（季節精霊・過去）', cost: { type: 'unknown' }, dye: false },
    { id: 'shoes_009', name: '自己の確立　靴', source: 'ムーミンの季節（季節の存在・過去）', cost: { type: 'unknown' }, dye: false },
    { id: 'shoes_010', name: '光に染まる挑戦的な表現者　靴', source: '光に染まる季節（季節精霊・過去）', cost: { type: 'unknown' }, dye: true },
    { id: 'shoes_011', name: '光に染まる飛び跳ねる舞踏家　靴', source: '光に染まる季節（季節精霊・過去）', cost: { type: 'unknown' }, dye: true },
    { id: 'shoes_012', name: '木こりの訴えかける親　靴', source: '青い鳥の季節（季節精霊・過去）', cost: { type: 'unknown' }, dye: true },
    { id: 'shoes_013', name: '手負いの巡回兵　靴', source: 'ふたつの灯火の季節　前編（季節精霊・過去）', cost: { type: 'unknown' }, dye: false },
    { id: 'shoes_014', name: '渡りの究極　靴', source: '渡りの季節（季節の案内人・究極の贈り物）', cost: { type: 'na', note: 'シーズンハートで交換する「究極の贈り物」のため、キャンドル等の価格は設定されていません。' }, dye: true },
    { id: 'shoes_015', name: '月虹ローファー', source: '彩なす日々', cost: { type: 'money', value: '$19.99' }, dye: false },
    { id: 'shoes_016', name: '陽光ずんぐりサンダル', source: '陽光の日々', cost: { type: 'money', value: '$9.99' }, dye: false },
    { id: 'shoes_017', name: 'いたずらウィッチ・ジャンパーシューズ', source: 'いたずらな日々', cost: { type: 'money', value: '$9.99', note: 'アウトフィットとのセット価格です（単品の価格ではありません）。' }, dye: false },
    { id: 'shoes_018', name: 'いたずらゴスブーツ', source: 'いたずらな日々', cost: { type: 'candle', value: 38 }, dye: false },
    { id: 'shoes_019', name: 'お洒落シルクトゥシューズ', source: 'お洒落な日々', cost: { type: 'heart', value: 13 }, dye: false },
    { id: 'shoes_020', name: '月灯りバニーシューズ', source: '月灯りの日々', cost: { type: 'money', value: '$6.99' }, dye: false },
    { id: 'shoes_021', name: '隠者のぬくもりブーツ', source: '聖なる星の日々', cost: { type: 'money', value: '$6.99' }, dye: false },
    { id: 'shoes_022', name: '冬編むふわふわレッグウォーマー', source: '聖なる星の日々', cost: { type: 'money', value: '$6.99', note: 'ヘアアクセサリーとのセット価格です（単品の価格ではありません）。' }, dye: true },
    { id: 'shoes_023', name: '音楽の旅スニーカー', source: 'AURORAアンコール・コンサート（限定・復刻なし）', cost: { type: 'money', value: '$6.99' }, dye: false, limited: true },
    { id: 'shoes_024', name: '宝探しキャバリエブーツ', source: '宝探しの日々', cost: { type: 'candle', value: 32 }, dye: true },
    { id: 'shoes_025', name: '海の泡沫ブーツ', source: '自然の日々', cost: { type: 'money', value: '$24.99', note: 'ケープとのセット価格です（単品の価格ではありません）。' }, dye: false },
    { id: 'shoes_026', name: 'アニバーサリースリッパ', source: 'Skyアニバーサリー', cost: { type: 'money', value: '$9.99', note: 'アウトフィットとのセット価格です（単品の価格ではありません）。' }, dye: false },
    { id: 'shoes_026b', name: 'オレオスリッパ', source: 'Skyアニバーサリー（開催中）', cost: { type: 'money', value: '$4.99' }, dye: false, current: true },
    { id: 'shoes_027', name: '大競技会スケートシューズ', source: '凱旋の大競技会', cost: { type: 'money', value: '$14.99', note: 'アウトフィットとのセット価格です（単品の価格ではありません）。' }, dye: true },
  ],
};

const CAT_LABELS = { shoes: 'シューズ' };

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

function costHtml(cost) {
  if (cost.type === 'candle') return `<div class="item-cost">🕯️ ${cost.value}本</div>`;
  if (cost.type === 'heart') return `<div class="item-cost">💗 ${cost.value}個</div>`;
  if (cost.type === 'money') return `<div class="item-cost money">${cost.value}</div>`;
  if (cost.type === 'na') return `<div class="item-cost unknown">対象外</div>`;
  return `<div class="item-cost unknown">不明</div>`;
}

function renderItems() {
  const cat = document.getElementById('catSelect').value;
  const items = ITEM_COST_DATA[cat] || [];
  document.getElementById('listLabel').textContent = `${CAT_LABELS[cat]}のコスト一覧`;

  const html = items.map(item => {
    const badges = [];
    if (item.dye) badges.push(`<span class="item-badge dye-yes">染色〇</span>`);
    if (item.current) badges.push(`<span class="item-badge current">開催中</span>`);
    if (item.limited) badges.push(`<span class="item-badge limited">復刻なし</span>`);

    return `
      <div class="item-card">
        <div class="item-head">
          <div>
            <div class="item-name">${escapeHtml(item.name)}</div>
            <div class="item-source">${escapeHtml(item.source)}</div>
          </div>
          ${costHtml(item.cost)}
        </div>
        ${badges.length ? `<div class="item-badges">${badges.join('')}</div>` : ''}
        ${item.cost.note ? `<div class="item-note">※ ${escapeHtml(item.cost.note)}</div>` : ''}
      </div>`;
  }).join('');

  document.getElementById('itemList').innerHTML = html;
}

document.addEventListener('DOMContentLoaded', renderItems);
</script>

</body>
</html>
